name: Rust

on:
  push:
    branches: [master]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/rust.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check + test + clippy
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # darkroom-ui pulls in gtk4 + libadwaita; without their system dev
      # packages cargo can't even type-check the workspace. Cairo / pango /
      # gdk-pixbuf / graphene cover the transitive crates; clang/libclang are
      # for any future bindgen consumer (darkroom-sys may add them).
      - name: Install GTK4 + Adwaita system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libgraphene-1.0-dev \
            libcairo2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libsqlite3-dev libssl-dev zlib1g-dev libclang-dev clang \
            libfontconfig-dev libfreetype-dev pkg-config

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --component clippy
          rustup override set stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      # `cargo check` proves the whole workspace type-checks (including the
      # GTK4 darkroom-ui crate and the darkroom-rs binary).
      - name: cargo check
        run: cargo check --workspace

      # Full unit-test sweep. `--release` keeps the runtime within the
      # default 6h job budget on the larger crates.
      - name: cargo test
        run: cargo test --workspace --release

      # Clippy at *default* strictness: catches actual bugs (incorrect
      # constant precision, dead unsafe, etc.) without enforcing the
      # ~150 stylistic lints (`# Safety` docstrings, range loops, …)
      # that would force a one-shot rewrite of every existing IOP.
      # Tighten this once the bulk of the migration lands.
      - name: cargo clippy
        run: cargo clippy --workspace
