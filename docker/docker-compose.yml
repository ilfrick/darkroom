---
# Darkroom – docker-compose
# Usage:
#   CPU only:      docker compose up
#   NVIDIA GPU:    docker compose --profile gpu up
#   AMD/Intel GPU: docker compose --profile opencl up

services:

  # ── CPU-only (default) ────────────────────────────────────────────────────
  darkroom:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        CMAKE_BUILD_TYPE: Release
        USE_AI: "ON"
        JOBS: "4"
    image: ghcr.io/ilfrick/darkroom:latest
    container_name: darkroom
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - DARKROOM_CONFIGDIR=/config/darkroom
      - DARKROOM_CACHEDIR=/config/cache
    volumes:
      - /path/to/photos:/photos
      - darkroom-config:/config
    ports:
      - "3000:3000"   # KasmVNC HTTP
      - "3001:3001"   # KasmVNC HTTPS
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined   # required for ptrace inside container
    shm_size: "2gb"

  # ── NVIDIA GPU variant ────────────────────────────────────────────────────
  darkroom-gpu:
    extends:
      service: darkroom
    profiles: [gpu]
    container_name: darkroom-gpu
    runtime: nvidia
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - DARKROOM_CONFIGDIR=/config/darkroom
      - DARKROOM_CACHEDIR=/config/cache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,graphics,utility,video
      # Tell darktable/OpenCL to use NVIDIA
      - DRI_PRIME=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, video]

  # ── AMD / Intel GPU via ROCm / OpenCL ────────────────────────────────────
  darkroom-opencl:
    extends:
      service: darkroom
    profiles: [opencl]
    container_name: darkroom-opencl
    devices:
      - /dev/dri:/dev/dri          # AMD/Intel DRM render nodes
      - /dev/kfd:/dev/kfd          # ROCm compute (AMD only)
    group_add:
      - video
      - render

volumes:
  darkroom-config:
