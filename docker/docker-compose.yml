---
# Darkroom – docker-compose with all GPU profiles
#
# Usage:
#   CPU only (default):
#     docker compose up darkroom
#
#   NVIDIA GPU:
#     docker compose --profile nvidia up darkroom-nvidia
#
#   AMD / Intel GPU (OpenCL via ROCm or Intel NEO):
#     docker compose --profile opencl up darkroom-opencl
#
# First-time build (CPU):
#   docker compose build darkroom
#
# Environment variables (set in .env or inline):
#   PUID        – host user ID for file ownership     (default: 1000)
#   PGID        – host group ID                       (default: 1000)
#   TZ          – timezone                            (default: Europe/Rome)
#   PHOTOS_DIR  – path to your photos on the host     (default: ~/Pictures)
#   CONFIG_DIR  – path for persistent config/cache    (default: ~/.config/darkroom-docker)

x-darkroom-base: &darkroom-base
  build:
    context: ..
    dockerfile: docker/Dockerfile
    args:
      CMAKE_BUILD_TYPE: Release
      USE_AI: "OFF"
      JOBS: "4"
  environment:
    PUID: ${PUID}
    PGID: ${PGID}
    TZ: ${TZ:-Europe/Rome}
    DARKROOM_CONFIGDIR: /config/darkroom
    DARKROOM_CACHEDIR: /config/cache
  volumes:
    - ${PHOTOS_DIR}:/photos
    - ${CONFIG_DIR}:/config
  ports:
    - "3000:3000"   # KasmVNC HTTP  → open http://localhost:3000
    - "3001:3001"   # KasmVNC HTTPS → open https://localhost:3001
  restart: unless-stopped
  security_opt:
    - seccomp:unconfined   # required for ptrace inside container
  shm_size: "2gb"

services:

  # ── CPU-only (works everywhere, no GPU setup needed) ──────────────────────
  darkroom:
    <<: *darkroom-base
    container_name: darkroom
    image: darkroom:latest

  # ── NVIDIA GPU ────────────────────────────────────────────────────────────
  # Prerequisites on host:
  #   1. NVIDIA driver installed
  #   2. nvidia-container-toolkit installed and configured
  #      https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/
  #   3. Docker daemon restarted after toolkit install
  #
  # Verify: docker run --rm --gpus all nvidia/cuda:12.0-base nvidia-smi
  darkroom-nvidia:
    <<: *darkroom-base
    container_name: darkroom-nvidia
    image: darkroom:nvidia
    profiles: [nvidia]
    runtime: nvidia
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Rome}
      DARKROOM_CONFIGDIR: /config/darkroom
      DARKROOM_CACHEDIR: /config/cache
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,graphics,utility,video
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, video]

  # ── AMD GPU (ROCm / OpenCL) ───────────────────────────────────────────────
  # Prerequisites on host:
  #   1. ROCm installed: https://rocm.docs.amd.com/
  #   2. User in 'video' and 'render' groups: sudo usermod -aG video,render $USER
  #
  # Verify: rocm-smi  (or clinfo | grep "Device Name")
  darkroom-amd:
    <<: *darkroom-base
    container_name: darkroom-amd
    image: darkroom:amd
    profiles: [amd]
    devices:
      - /dev/dri:/dev/dri    # DRM render nodes
      - /dev/kfd:/dev/kfd    # ROCm compute interface
    group_add:
      - video
      - render

  # ── Intel GPU (OpenCL via Intel NEO compute runtime) ──────────────────────
  # Prerequisites on host:
  #   1. Intel OpenCL runtime: sudo apt install intel-opencl-icd
  #   2. User in 'video' and 'render' groups: sudo usermod -aG video,render $USER
  #
  # Verify: clinfo | grep "Device Name"
  darkroom-intel:
    <<: *darkroom-base
    container_name: darkroom-intel
    image: darkroom:intel
    profiles: [intel]
    devices:
      - /dev/dri:/dev/dri    # DRM render nodes (includes renderD128 for compute)
    group_add:
      - video
      - render

volumes:
  darkroom-config:
